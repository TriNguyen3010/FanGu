<style>
  :root {
    --cream: #FFF3E2;
    --paper: #FFFBF4;
    --ink: #1A1510;
    --coral: #FF5247;
    --lime: #C9F24A;
    --sun: #FFC94D;
    --sky: #7FB8FF;
    --mint: #6FE3C0;
    --pink: #FFB3C7;
    --muted: #8A7F70;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    background:

      radial-gradient(circle at 85% 22%, rgba(255,82,71,0.30), transparent 40%),
      radial-gradient(circle at 50% 110%, rgba(127,184,255,0.35), transparent 45%),

    color: var(--ink);
    min-height: 100vh;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 40px 16px 56px;
  }
  .brandline { text-align: center; }
  .brandline h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 40px;
    letter-spacing: -1px;
    line-height: 1;
  }
  .brandline h1 .dot { color: var(--coral); }
  .brandline p {
    margin-top: 6px;
    color: #5C5345;
    font-weight: 500;
    font-size: 14px;
  }
  .hint {
    font-size: 12.5px;
    color: #6B6051;
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(26,21,16,0.15);
    padding: 7px 14px;
    border-radius: 999px;
    font-weight: 600;
  }

  /* ---- App primitives ---- */
  .app { font-family: 'Be Vietnam Pro', sans-serif; height: 100%; }
  .screen {
    min-height: 100%;
    padding: 14px 18px 96px;
    animation: screenIn .34s cubic-bezier(.2,.8,.25,1);
  }
  @keyframes screenIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .card { background: var(--paper); border: 2.5px solid var(--ink); border-radius: 22px; box-shadow: 4px 4px 0 var(--ink); }
  .softcard { background: var(--paper); border: 2px solid rgba(26,21,16,0.12); border-radius: 20px; }

  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    text-transform: uppercase; color: var(--ink);
    background: rgba(26,21,16,0.07); padding: 4px 9px; border-radius: 999px;
  }
  .pill { display:inline-flex; align-items:center; gap:5px; padding:6px 11px; border-radius:999px; font-weight:700; font-size:12.5px; }

  .btn {
    width: 100%; border: 2.5px solid var(--ink); border-radius: 16px;
    background: var(--coral); color: #fff; font-family: 'Baloo 2', sans-serif;
    font-weight: 700; font-size: 17px; padding: 14px; cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink); transition: transform .08s, box-shadow .08s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--ink); }
  .btn.lime { background: var(--lime); color: var(--ink); }
  .btn.ghost { background: var(--paper); color: var(--ink); box-shadow: none; }

  .qopt {
    display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    background: var(--paper); border: 2.5px solid var(--ink); border-radius: 18px;
    padding: 15px 16px; cursor:pointer; box-shadow: 3px 3px 0 var(--ink);
    transition: transform .1s, box-shadow .1s, background .15s;
    font-family: inherit;
  }
  .qopt:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--ink); }
  .qopt .badge {
    flex:0 0 auto; width:38px; height:38px; border-radius:11px; border:2px solid var(--ink);
    display:flex; align-items:center; justify-content:center; font-family:'Baloo 2'; font-weight:800; font-size:19px;
  }

  .barTrack { height: 30px; border-radius: 9px; background: rgba(26,21,16,0.08); overflow: hidden; border:2px solid var(--ink); }
  .barFill { height: 100%; border-radius: 6px 0 0 6px; transition: width 1s cubic-bezier(.2,.8,.25,1); display:flex; align-items:center; }

  /* match card */
  .matchwrap { position: relative; height: 430px; }
  .matchcard {
    position:absolute; inset:0; border:2.5px solid var(--ink); border-radius:26px; overflow:hidden;
    box-shadow: 5px 6px 0 var(--ink); background: var(--paper);
    display:flex; flex-direction:column; animation: pop .32s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop { from { opacity:0; transform: scale(.94) translateY(8px);} to { opacity:1; transform:none; } }
  .matchphoto { flex: 1; position: relative; display:flex; align-items:center; justify-content:center; }
  .actionbtn {

  .tabbar {
    position:absolute; left:10px; right:10px; bottom:14px; height:64px;
    background: var(--ink); border-radius: 22px; display:flex; align-items:center; justify-content:space-around;

  .tabitem { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:#9C9388; font-size:10.5px; font-weight:700; padding:6px 10px; position:relative; }
  .tabitem.active { color: var(--lime); }
  .tabitem .ti { font-size: 21px; line-height:1; }
  .tabbadge { position:absolute; top:-2px; right:2px; background:var(--coral); color:#fff; font-size:9px; min-width:16px; height:16px; border-radius:999px; display:flex; align-items:center; justify-content:center; padding:0 3px; border:1.5px solid var(--ink); }

  /* toast */
  .toast {
    position:absolute; left:50%; bottom:92px; transform:translateX(-50%);
    background: var(--ink); color:#fff; padding:11px 18px; border-radius:999px; font-weight:700; font-size:13px;
    z-index:60; animation: toastIn .3s cubic-bezier(.2,.9,.3,1.2); white-space:nowrap; box-shadow: 0 6px 20px rgba(0,0,0,.3);
  }
  @keyframes toastIn { from { opacity:0; transform:translate(-50%,12px);} to { opacity:1; transform:translate(-50%,0);} }

  .heartburst { position:absolute; font-size:34px; animation: floatUp 1s ease-out forwards; pointer-events:none; z-index:70; }
  @keyframes floatUp { 0%{opacity:1; transform:translateY(0) scale(.6);} 100%{opacity:0; transform:translateY(-90px) scale(1.4);} }

  .scrollarea { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scrollarea::-webkit-scrollbar { display: none; }

  @media (max-width: 600px) {
    body { padding: 0; }
    .stage { padding: 0; gap: 0; min-height: 100vh; min-height: 100dvh; justify-content: flex-start; }
    .brandline, .hint { display: none !important; }
    .phoneWrap { padding: 0 !important; border-radius: 0 !important; box-shadow: none !important; }
    .phoneScreen { width: 100vw !important; height: 100vh !important; height: 100dvh !important; border-radius: 0 !important; }

function MatchScreen({ go, toast, addFriend, friends, q, answer }) {
  const [idx, setIdx] = useState(0);
  const [bursts, setBursts] = useState([]);
  const chosen = q.options.find(o=>o.id===answer) || q.options[0];
  const u = MATCHES[idx];

  function burst() {
    const id = Date.now() + Math.round(performance.now());
    setBursts(b=>[...b, id]);
    setTimeout(()=>setBursts(b=>b.filter(x=>x!==id)), 1000);
  }
  function act(type) {
    if (type==='tim') { burst(); toast('💛 Đã gửi tim cho ' + u.name); }
    if (type==='hi') { toast('👋 Đã say hi với ' + u.name); }
    if (type==='ket') { addFriend(u.name); toast('🎉 Đã kết bạn với ' + u.name); }
    setTimeout(()=>setIdx(i=>i+1), type==='skip'?0:520);
  }

  return (
    <div className="screen">
      <Header title="Cùng gu với bạn" onBack={()=>go('result')}
        right={<div className="pill" style={{ background:'var(--lime)' }}>💛 {friends}</div>} />
      <div style={{ textAlign:'center', marginBottom:12, fontSize:13, color:'var(--muted)', fontWeight:600 }}>
        Cùng chọn {chosen.emoji} <b style={{ color:'var(--ink)' }}>{chosen.label}</b>
      </div>

      {u ? (
        <div>
          <div className="matchwrap">
            <div className="matchcard" key={idx}>
              <div className="matchphoto" style={{ background:`linear-gradient(150deg, ${u.color}, var(--cream))` }}>
                <div style={{ fontSize:96 }}>{u.emoji}</div>
                <div className="pill" style={{ position:'absolute', top:12, left:12, background:'var(--ink)', color:'var(--lime)' }}>{chosen.emoji} cùng gu</div>
                {bursts.map(b=>(<div key={b} className="heartburst" style={{ bottom:30, left:'46%' }}>💛</div>))}
              </div>
              <div style={{ padding:'14px 16px 16px' }}>
                <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
                  <div style={{ fontFamily:'Baloo 2', fontWeight:800, fontSize:22 }}>{u.name}, {u.age}</div>
                  <div style={{ fontSize:12, color:'var(--muted)', fontWeight:600 }}>· {u.dist}</div>
                </div>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap', margin:'9px 0' }}>
                  {u.tags.map(t=>(<span key={t} className="tag" style={{ textTransform:'none', background:'rgba(26,21,16,0.08)' }}>#{t}</span>))}
                </div>
                <div style={{ fontSize:13, fontWeight:500, color:'#5C5345', lineHeight:1.35 }}>“{u.bio}”</div>
              </div>
            </div>
          </div>

          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:16, marginTop:18 }}>
            <button className="actionbtn" onClick={()=>act('skip')} title="Bỏ qua">✕</button>
            <button className="actionbtn" style={{ background:'var(--pink)' }} onClick={()=>act('tim')} title="Gửi tim">💛</button>
            <button className="actionbtn" style={{ background:'var(--sky)' }} onClick={()=>act('hi')} title="Say hi">👋</button>
            <button className="actionbtn" style={{ background:'var(--lime)' }} onClick={()=>act('ket')} title="Kết bạn">➕</button>
          </div>
          <div style={{ textAlign:'center', marginTop:12, fontSize:12, color:'var(--muted)', fontWeight:600 }}>Còn {MATCHES.length - idx - 1} người cùng gu nữa</div>
        </div>
      ) : (
        <div className="card" style={{ padding:26, textAlign:'center', marginTop:30 }}>
          <div style={{ fontSize:50 }}>🥳</div>
          <div style={{ fontFamily:'Baloo 2', fontWeight:800, fontSize:20, marginTop:8 }}>Hết người cùng gu rồi!</div>
          <div style={{ fontSize:13.5, color:'var(--muted)', fontWeight:500, marginTop:6, lineHeight:1.4 }}>Trả lời câu hỏi mai để gặp thêm người mới nhé 💫</div>

        </div>

  );
}

/* ============================ Tab bar ============================ */
function TabBar({ screen, go, friends }) {
  const tabs = [
    { id:'home', icon:'🥖', label:'Câu hỏi' },
    { id:'leaderboard', icon:'🏆', label:'BXH' },
    { id:'match', icon:'💛', label:'Kết bạn', badge:friends },
    { id:'share', icon:'📤', label:'Chia sẻ' },
  ];
  const map = { home:'home', question:'home', result:'home', match:'match', leaderboard:'leaderboard', share:'share' };
  return (
    <div className="tabbar">
      {tabs.map(t=>(
        <div key={t.id} className={'tabitem' + (map[screen]===t.id ? ' active':'')} onClick={()=>go(t.id)}>
          <span className="ti">{t.icon}</span>
          <span>{t.label}</span>
          {t.badge>0 && <span className="tabbadge">{t.badge}</span>}
        </div>
      ))}
    </div>
  );
}

/* ============================ App ============================ */
function AppPhone() {
  const [screen, setScreen] = useState('home');
  const [qIndex, setQIndex] = useState(0);
  const [answer, setAnswer] = useState('B');
  const [friendNames, setFriendNames] = useState([]);
  const [points, setPoints] = useState(1240);
  const [toastMsg, setToastMsg] = useState(null);
  const toastTimer = useRef(null);

  function go(s) { setScreen(s); }
  function goQuestion(i) { setQIndex(i); setScreen('question'); }
  function toast(msg) {
    setToastMsg(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToastMsg(null), 1800);
  }
  function onAnswer(id) { setAnswer(id); setPoints(p=>p+50); go('result'); }
  function addFriend(name) { setFriendNames(prev => prev.includes(name) ? prev : [...prev, name]); }

  const friends = friendNames.length;
  const activeQ = QUESTIONS[qIndex];

  return (
    <div className="app">
      {screen==='home' && <HomeScreen go={go} goQuestion={goQuestion} points={points} rank={47} />}
      {screen==='question' && <QuestionScreen go={go} onAnswer={onAnswer} q={activeQ} />}
      {screen==='result' && <ResultScreen go={go} answer={answer} q={activeQ} />}
      {screen==='match' && <MatchScreen go={go} toast={toast} addFriend={addFriend} friends={friends} q={activeQ} answer={answer} />}
      {screen==='leaderboard' && <LeaderboardScreen go={go} rank={47} points={points} />}
      {screen==='share' && <ShareScreen go={go} toast={toast} />}
      {toastMsg && <div className="toast">{toastMsg}</div>}
      <TabBar screen={screen} go={go} friends={friends} />
    </div>
  );
}

function App() {
  return (
    <div className="stage">
      <div className="brandline">
        <h1>Fan Gu<span className="dot">.</span></h1>
        <p>Trả lời câu dí dỏm · Tìm người cùng gu · Leo top nhận vé concert</p>
      </div>
      <IosFrame bg="var(--cream)">
        <AppPhone />
      </IosFrame>
      <div className="hint">👆 Bấm “Trả lời ngay” hoặc cuộn xuống mục “Chơi thêm” để thử 4 câu mới</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
